$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonInitialObservation
description: >
  An SOSA ObservationCollection providing the initial state observed in a 
  water body. The hasFeatureOfInterest is the lake/mesocosm. Each member
  Observation supplies one state variable.
allOf:
  - $ref: "https://ogcincubator.github.io/ogc-utils/build/annotated/utils/iri-or-curie/schema.yaml"
type: object
required: [type, featureOfInterest, resultTime, observedProperties]
properties:
  type:
    const: ObservationCollection
  featureOfInterest:
    type: object
    description: The sampled water body or mesocosm
    required: [type, geometry]
    properties:
      type:
        const: Feature
      geometry:
        type: object
        description: GeoJSON geometry of the sampling location
      properties:
        type: object
        properties:
          name: { type: string }
          depth_m: { type: number }
  resultTime:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the observation (= t=0 of the simulation)
  phenomenonTime:
    type: string
    description: ISO 8601 interval (e.g. "2022-07-01/2022-07-07")
  observedProperties:
    type: object
    required: [X1_initial, X2_initial, N_observed]
    properties:
      X1_initial:
        type: number
        description: Initial phytoplankton density [mg.dw·l⁻¹]
        minimum: 0
      X2_initial:
        type: number
        description: Initial zooplankton density [mg.dw·l⁻¹]
        minimum: 0
      N_observed:
        type: number
        description: Observed nutrient level (relative)
        minimum: 0
      observedBy:
        type: string
        description: URI or name of the sensor/observer