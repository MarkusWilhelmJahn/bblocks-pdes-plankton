$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonRDASTACItem
description: >
  A STAC 1.0 Item cataloguing outputs of a plankton RDA simulation run,
  with plankton-rda extension properties for scenario, diffusion ratio
  and advection velocity.
type: object
required: [type, stac_version, id, geometry, bbox, properties, links, assets]
properties:

  type:
    const: Feature

  stac_version:
    type: string
    const: "1.0.0"

  stac_extensions:
    type: array
    items:
      type: string

  id:
    type: string
    description: "Unique run identifier, e.g. 'S001'"

  geometry:
    type: object
    description: >
      GeoJSON geometry of the simulation domain.
      Point for ODE, LineString for 1D PDE, Polygon for 2D PDE.
    required: [type, coordinates]
    properties:
      type:
        type: string
        enum: [Point, LineString, Polygon]
      coordinates: {}

  bbox:
    type: array
    minItems: 4
    items:
      type: number

  properties:
    type: object
    required: [datetime, "mwj-pdes:model", "plankton-rda:scenario"]
    properties:
      datetime:
        type: string
        format: date-time
        description: "Simulation start time (ISO 8601)"
      "mwj-pdes:model":
        type: string
        const: "Scheffer1991-RDA"
      "mwj-pdes:modelClass":
        type: string
        const: "model.lokal.o2.Plankton"
      "mwj-pdes:solver":
        type: string
        enum: [jEuler, jRungeKutta, jButcher]
      "mwj-pdes:dimensions":
        type: integer
        enum: [0, 1, 2]
        description: "0 = ODE only, 1 = 1D PDE, 2 = 2D PDE"
      "mwj-pdes:provenance":
        type: string
        description: "URI of the PlanktonSimulationProcedure"
      "mwj-pdes:observation":
        type: string
        description: "URI of the initial ObservationCollection"
      "plankton-rda:scenario":
        type: string
        enum:
          - ODE-stable-node
          - ODE-stable-focus
          - ODE-limit-cycle
          - 1D-Turing-standing-pattern
          - 2D-Turing-standing-pattern
          - 1D-DIFICI-travelling-wave
          - 2D-DIFICI-travelling-wave
      "plankton-rda:D1":
        type: number
        description: "Phytoplankton diffusivity D1 [cm^2 d^-1]"
      "plankton-rda:D2":
        type: number
        description: "Zooplankton diffusivity D2 [cm^2 d^-1]"
      "plankton-rda:D_ratio":
        type: number
        description: "D2/D1 ratio — ratio > ~100 triggers Turing instability"
      "plankton-rda:v_rel":
        type: number
        description: "|v1x - v2x| [cm d^-1] — > 0 triggers DIFICI travelling waves"
      "plankton-rda:delta":
        type: number
        description: "Zooplankton mortality rate delta [d^-1] — primary bifurcation parameter"
      "plankton-rda:boundary_condition":
        type: string
        enum: [zero-flux, periodic, dirichlet]
      "plankton-rda:domain_length_x_cm":
        type: number
        description: "Domain length in x [cm]"
      "plankton-rda:domain_length_y_cm":
        type: number
        description: "Domain length in y [cm] — 2D only"

  links:
    type: array
    items:
      type: object
      required: [href, rel]
      properties:
        href:   { type: string }
        rel:    { type: string }
        type:   { type: string }
        title:  { type: string }

  assets:
    type: object
    description: "STAC assets — at minimum the VTI time-series"
    properties:
      vti_series:
        type: object
        properties:
          href:   { type: string }
          type:   { type: string }
          title:  { type: string }
          roles:  { type: array, items: { type: string } }
