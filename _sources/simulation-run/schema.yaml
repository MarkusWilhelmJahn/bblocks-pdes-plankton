$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonSimulationRun
description: >
  A PROV Activity representing one FDM execution of the Scheffer
  phytoplankton/zooplankton RDA model using FiniteDifferenceMethod4PDES.
type: object
required: [type, startedAtTime, endedAtTime, wasAssociatedWith, used, parameters, generated]
properties:

  type:
    const: SimulationRun

  id:
    type: string
    description: "URI identifying this run"

  label:
    type: string
    description: "Human-readable label, e.g. 'Turing-1D-D2_2e-3'"

  startedAtTime:
    type: string
    format: date-time

  endedAtTime:
    type: string
    format: date-time

  wasAssociatedWith:
    type: object
    description: "Software agent that executed the simulation (prov:wasAssociatedWith)"
    required: [id, label, version]
    properties:
      id:
        type: string
        const: "https://github.com/MarkusWilhelmJahn/FiniteDifferenceMethod4PDES"
      label:
        type: string
        const: "FiniteDifferenceMethod4PDES"
      version:
        type: string
        description: "Git tag or commit SHA"
      localPath:
        type: string
        const: "/Users/markusjahn/Documents/GitHub/FiniteDifferenceMethod4PDES"

  numericalScheme:
    type: string
    description: "FDM time-integration scheme"
    enum: [explicit-euler, implicit-euler, crank-nicolson, runge-kutta-4]

  spatialDiscretisation:
    type: string
    description: "FDM spatial discretisation scheme"
    enum: [central-difference, upwind, lax-wendroff]

  used:
    type: object
    description: "Input resources consumed (prov:used)"
    required: [observation]
    properties:
      observation:
        type: string
        description: "URI of the SOSA ObservationCollection (initial conditions)"
      parametersId:
        type: string
        description: "URI of the parameter set entity"

  parameters:
    description: "Exact parameter values used — inline copy for full reproducibility"
    type: object
    required: [alpha, c, gamma, H1, H2, HN, e, delta, F, N, D1, D2]
    properties:
      alpha:  { type: number }
      c:      { type: number }
      gamma:  { type: number }
      H1:     { type: number }
      H2:     { type: number }
      HN:     { type: number }
      e:      { type: number }
      delta:  { type: number }
      F:      { type: number }
      N:      { type: number }
      D1:     { type: number }
      D2:     { type: number }
      v1x:    { type: number }
      v2x:    { type: number }
      v1y:    { type: number }
      v2y:    { type: number }
      dt:     { type: number }
      t_end:  { type: number }
      domain_length_x_cm: { type: number }
      domain_length_y_cm: { type: number }
      grid_points_x:      { type: integer }
      grid_points_y:      { type: integer }
      boundary_condition: { type: string }
      spatial_dimensions: { type: integer }

  generated:
    type: array
    minItems: 1
    description: "Output assets generated by this run (prov:wasGeneratedBy)"
    items:
      type: object
      required: [id, type, format]
      properties:
        id:
          type: string
          description: "Relative path or URI to the output file"
        type:
          type: string
          enum:
            - timeseries-csv
            - spatial-field-csv
            - spatial-field-netcdf
            - phytoplankton-surface-png
            - zooplankton-surface-png
            - phase-portrait-png
            - wave-number-plot-png
            - bifurcation-diagram-png
        format:
          type: string
        description:
          type: string

  scenario:
    type: string
    description: "Qualitative scenario label"
    enum:
      - ODE-stable-node
      - ODE-stable-focus
      - ODE-limit-cycle
      - 1D-Turing-standing-pattern
      - 2D-Turing-standing-pattern
      - 1D-DIFICI-travelling-wave
      - 2D-DIFICI-travelling-wave

  stacItem:
    type: string
    description: "URI of the STAC Item cataloguing this run's outputs"
