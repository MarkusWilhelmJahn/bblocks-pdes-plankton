$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonInitialObservation
description: >
  A SOSA ObservationCollection providing initial conditions for a plankton
  RDA simulation run. Referenced by the SimulationProcedure via
  sosa:usedProcedure.
type: object
required: [type, featureOfInterest, phenomenonTime, madeBySensor, hasMember]
properties:

  type:
    const: ObservationCollection

  featureOfInterest:
    type: object
    description: "The sampled water body or simulation spatial domain"
    required: [type, geometry]
    properties:
      type:
        const: Feature
      geometry:
        type: object
        description: >
          GeoJSON geometry of the domain.
          LineString for 1D, Polygon for 2D, Point for ODE.
        required: [type, coordinates]
        properties:
          type:
            type: string
            enum: [Point, LineString, Polygon]
          coordinates: {}
      properties:
        type: object
        properties:
          name:            { type: string }
          crs:             { type: string, default: "model-units" }
          domainType:
            type: string
            enum: [spatial-pde, phase-portrait-ode]
          gridDimensions:
            type: object
            properties:
              nx: { type: integer }
              ny: { type: integer }
              nz: { type: integer }
          gridSpacing:
            type: object
            properties:
              dx: { type: number }
              dy: { type: number }
              dz: { type: number }
          initVtiFile:
            type: string
            description: "Path or URI to the initial VTI file (step = 1)"

  phenomenonTime:
    type: string
    description: "ISO 8601 time instant or interval — t = 0 of the simulation"

  madeBySensor:
    type: string
    description: "URI or name of the sensor / instrument"

  usedProcedure:
    type: string
    description: "URI of the PlanktonSimulationProcedure (sosa:usedProcedure)"

  hasMember:
    type: array
    minItems: 2
    description: >
      One sosa:Observation per state variable.
      Minimum: phytoplankton (X1) and zooplankton (X2).
    items:
      type: object
      required: [observedProperty, hasResult, resultTime]
      properties:
        observedProperty:
          type: string
          description: >
            URI of the sosa:ObservableProperty. Use:
              https://mwj.example.org/pdes/obs/plankton/phytoplankton
              https://mwj.example.org/pdes/obs/plankton/zooplankton
              https://mwj.example.org/pdes/obs/plankton/nutrientLevel
              https://mwj.example.org/pdes/obs/plankton/fishPredationPressure
        hasResult:
          type: object
          required: [value]
          properties:
            value:
              type: number
              minimum: 0
            unit:
              type: string
              description: "'mg.dw/l' for X1, X2; 'relative' for N; 'mg.dw/d/l' for F"
        resultTime:
          type: string
          format: date-time

  perturbation:
    type: object
    description: "Optional spatial perturbation to seed pattern formation"
    properties:
      amplitude:
        type: number
        description: "Fraction of steady-state value"
      type:
        type: string
        enum: [random, symmetric, asymmetric, none]
