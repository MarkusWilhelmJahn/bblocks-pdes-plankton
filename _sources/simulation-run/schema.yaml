$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonSimulationProcedure
description: >
  A sosa:Procedure describing how to execute the Scheffer (1991)
  phytoplankton/zooplankton RDA model in FiniteDifferenceMethod4PDES.
  Referenced from a sosa:ObservationCollection via sosa:usedProcedure.
type: object
required: [type, modelClass, software, numericalSolver, dt, t_end]
properties:

  type:
    const: SimulationProcedure

  id:
    type: string
    description: "URI identifying this procedure"

  label:
    type: string
    description: "Human-readable label, e.g. 'Plankton-Euler-1D-Turing'"

  modelClass:
    const: "model.lokal.o2.Plankton"
    description: "Java class implementing the Scheffer RDA model"

  software:
    type: object
    required: [id, label, version]
    properties:
      id:
        type: string
        const: "https://github.com/MarkusWilhelmJahn/FiniteDifferenceMethod4PDES"
      label:
        type: string
        const: "FiniteDifferenceMethod4PDES"
      version:
        type: string

  numericalSolver:
    type: string
    enum: [jEuler, jRungeKutta, jButcher]
    description: "Time-integration solver class (model.numerik.*)"

  dt:
    type: number
    minimum: 0
    exclusiveMinimum: 0
    description: "Time step [d]"

  t_end:
    type: number
    minimum: 0
    description: "Simulation end time [d]"

  simulationDomain:
    type: string
    description: "URI of the PlanktonSimulationDomain (mwj.pdes.simulation-domain) defining the VTK Image Data grid"

  parameters:
    description: "Plankton RDA parameter set"
    $ref: "../parameters/schema.yaml"

  scenario:
    type: string
    description: "Qualitative scenario label"
    enum:
      - ODE-stable-node
      - ODE-stable-focus
      - ODE-limit-cycle
      - 1D-Turing-standing-pattern
      - 2D-Turing-standing-pattern
      - 1D-DIFICI-travelling-wave
      - 2D-DIFICI-travelling-wave

  spatialSetup:
    type: object
    description: "PDE spatial configuration — omit for pure ODE runs"
    properties:
      dimensions:
        type: integer
        enum: [1, 2]
      domain_length_x:  { type: number, minimum: 0, description: "Domain length in x [cm]" }
      domain_length_y:  { type: number, minimum: 0, description: "Domain length in y [cm] — 2D only" }
      grid_points_x:    { type: integer, minimum: 2 }
      grid_points_y:    { type: integer, minimum: 2, description: "2D only" }
      boundary_condition:
        type: string
        enum: [zero-flux, periodic, dirichlet]
      diffusion:
        type: boolean
      advection:
        type: boolean
