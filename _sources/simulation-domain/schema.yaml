$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonSimulationDomain
description: >
  Spatial description of the VTK Image Data (vtkImageData) grid used as the
  plankton RDA simulation domain in FiniteDifferenceMethod4PDES.

  Two domain types are supported:

  1. **PDE spatial domain** (`domainType: spatial-pde`) — the physical space
     over which the reaction-diffusion-advection PDE is solved. Each grid cell
     holds phytoplankton (X1) and zooplankton (X2) values at one timestep.
     Geometry is a LineString (1D) or Polygon (2D).

  2. **ODE phase-portrait domain** (`domainType: phase-portrait-ode`) — for
     pure ODE runs, the VTK grid maps state-space onto a 3D voxel grid via
     Room.getDGL(). The geometry is abstract (no real-world CRS).

  VTK Image Data grid structure (from Room.java):
    j = x + y * dim[0] + z * dim[0] * dim[1]
    position[x,y,z] = origin + [x * spacing[0], y * spacing[1], z * spacing[2]]

  VTI point-data array names follow the convention:
    "phase Phytoplankton", "phase Zooplankton"   (phase-space arrays)
    "local Phytoplankton", "local Zooplankton"   (local statistics)
    "global Phytoplankton", "global Zooplankton" (global statistics)

type: object
required: [type, domainType, dimensions, spacing, origin, arrayNames]
properties:

  type:
    const: SimulationDomain

  id:
    type: string
    description: "URI identifying this domain"

  label:
    type: string
    description: "Human-readable label, e.g. 'Plankton-1D-100cm'"

  domainType:
    type: string
    enum: [spatial-pde, phase-portrait-ode]
    description: >
      'spatial-pde': real spatial domain of a PDE simulation.
      'phase-portrait-ode': abstract state-space grid for ODE visualisation.

  dimensions:
    type: object
    required: [nx, ny, nz]
    description: "Number of grid points in each direction (vtkImageData WholeExtent)"
    properties:
      nx: { type: integer, minimum: 1 }
      ny: { type: integer, minimum: 1 }
      nz: { type: integer, minimum: 1 }

  spacing:
    type: object
    required: [dx, dy, dz]
    description: "Grid cell spacing in each direction (VTK Spacing attribute)"
    properties:
      dx: { type: number, minimum: 0 }
      dy: { type: number, minimum: 0 }
      dz: { type: number, minimum: 0 }

  origin:
    type: object
    required: [x, y, z]
    description: "Grid origin coordinates (VTK Origin attribute)"
    properties:
      x: { type: number }
      y: { type: number }
      z: { type: number }

  arrayNames:
    type: array
    minItems: 1
    items: { type: string }
    description: >
      Names of the VTK point-data arrays in the VTI files.
      For the plankton model: 'phase Phytoplankton', 'phase Zooplankton',
      'local Phytoplankton', 'local Zooplankton', etc.

  vtiSeries:
    type: object
    description: "References to the VTI time-series files."
    required: [runName, stepCount, initFile]
    properties:
      runName:
        type: string
        description: "Run name prefix: <runName>_<step>.vti"
      stepCount:
        type: integer
        minimum: 1
        description: "Total number of timestep files in the series"
      initFile:
        type: string
        description: "Path to the initial-condition VTI file (step = 1)"
      dataFolder:
        type: string
        description: "Folder containing all VTI files"

  geometry:
    type: object
    description: >
      GeoJSON geometry of the simulation domain extent.
      LineString for 1D PDE, Polygon for 2D PDE, Point for ODE phase-portrait.
    properties:
      type:
        type: string
        enum: [Point, LineString, Polygon]
      coordinates: {}

  crs:
    type: string
    description: >
      Coordinate reference system. Use 'model-units' for abstract numerical
      domains. Use an EPSG URI for real geographic domains.
    default: "model-units"

  boundingBox:
    type: object
    description: "Model-space bounding box"
    properties:
      min: { type: array, items: { type: number }, minItems: 3, maxItems: 3 }
      max: { type: array, items: { type: number }, minItems: 3, maxItems: 3 }
