$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonRDASTACItem
description: >
  A STAC 1.0 Item cataloguing the spatial field outputs of one plankton
  RDA simulation run. Uses the 'plankton-rda' extension namespace for
  model-specific searchable properties.
type: object
required: [type, stac_version, id, geometry, bbox, properties, links, assets]
properties:

  type:          { const: Feature }
  stac_version:  { const: "1.0.0" }
  stac_extensions:
    type: array
    items: { type: string }

  id:
    type: string
    description: "Unique run identifier matching SimulationRun.id suffix"

  geometry:
    type: object
    description: "GeoJSON geometry of the simulation spatial domain or observation site"

  bbox:
    type: array
    items: { type: number }
    minItems: 4

  properties:
    type: object
    required:
      - datetime
      - "plankton-rda:model"
      - "plankton-rda:scenario"
      - "plankton-rda:spatial_dimensions"
    properties:
      datetime:       { type: string, format: date-time }
      start_datetime: { type: string, format: date-time }
      end_datetime:   { type: string, format: date-time }

      "plankton-rda:model":
        type: string
        const: "Scheffer1991-RDA"

      "plankton-rda:scenario":
        type: string
        enum:
          - ODE-stable-node
          - ODE-stable-focus
          - ODE-limit-cycle
          - 1D-Turing-standing-pattern
          - 2D-Turing-standing-pattern
          - 1D-DIFICI-travelling-wave
          - 2D-DIFICI-travelling-wave

      "plankton-rda:spatial_dimensions":
        type: integer
        enum: [1, 2]

      "plankton-rda:D1":
        type: number
        description: "Phytoplankton diffusivity [cm^2 d^-1]"

      "plankton-rda:D2":
        type: number
        description: "Zooplankton diffusivity [cm^2 d^-1]"

      "plankton-rda:D_ratio":
        type: number
        description: "D2/D1 ratio — >~100 triggers Turing instability"

      "plankton-rda:v_rel":
        type: number
        description: "Differential advection speed |v1x - v2x| [cm d^-1] — >0 triggers DIFICI"

      "plankton-rda:delta":
        type: number
        description: "Zooplankton mortality rate [d^-1] — bifurcation parameter"

      "plankton-rda:boundary_condition":
        type: string
        enum: [zero-flux, periodic, dirichlet]

      "plankton-rda:domain_length_x_cm":
        type: number

      "plankton-rda:domain_length_y_cm":
        type: number

      "plankton-rda:t_end_d":
        type: number
        description: "Simulation end time [d]"

      "plankton-rda:numerical_scheme":
        type: string

      "plankton-rda:provenance":
        type: string
        description: "URI of the PROV SimulationRun Activity"

      "plankton-rda:observation":
        type: string
        description: "URI of the SOSA ObservationCollection used as IC"

  links:
    type: array
    items:
      type: object
      required: [href, rel]
      properties:
        href:  { type: string }
        rel:
          type: string
          description: >
            'derived_from' → PROV SimulationRun;
            'related'      → SOSA ObservationCollection;
            'software'     → FiniteDifferenceMethod4PDES repo.
        type:  { type: string }
        title: { type: string }

  assets:
    type: object
    description: "Named output files"
    additionalProperties:
      type: object
      required: [href, type]
      properties:
        href:  { type: string }
        type:  { type: string }
        title: { type: string }
        roles:
          type: array
          items:
            type: string
            enum: [data, overview, thumbnail, metadata]
