$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonSTACItem
description: >
  A STAC Item representing the outputs of one plankton model simulation run.
  Extends the core STAC Item with a 'plankton-sim' extension block.
allOf:
  - description: Core STAC Item fields
    type: object
    required: [type, stac_version, id, geometry, bbox, properties, links, assets]
    properties:
      type:           { const: Feature }
      stac_version:   { const: "1.0.0" }
      stac_extensions:
        type: array
        contains:
          const: "https://example.org/plankton-sim/v0.1/schema.json"
      id:
        type: string
        description: Unique run identifier (matches SimulationRun.id)
      geometry:
        type: object
        description: GeoJSON geometry of the simulation domain
      bbox:
        type: array
        items: { type: number }
        minItems: 4
      properties:
        type: object
        required: [datetime, "plankton-sim:model", "plankton-sim:scenario"]
        properties:
          datetime:
            type: string
            format: date-time
            description: Start time of the simulated period
          start_datetime: { type: string, format: date-time }
          end_datetime:   { type: string, format: date-time }
          "plankton-sim:model":
            type: string
            description: Model name
            const: "Scheffer-1991-PhytoZoo"
          "plankton-sim:scenario":
            type: string
            description: Qualitative scenario label
            enum:
              [stable-focus, stable-node, limit-cycle, excitable, chaos]
          "plankton-sim:delta":
            type: number
            description: Zooplankton mortality rate used (bifurcation parameter)
          "plankton-sim:duration_d":
            type: number
          "plankton-sim:method":
            type: string
          "plankton-sim:provenance":
            type: string
            description: URI of the PROV SimulationRun entity
          "plankton-sim:observation":
            type: string
            description: URI of the SOSA ObservationCollection used as IC
      links:
        type: array
        items:
          type: object
          required: [href, rel]
          properties:
            href: { type: string }
            rel:
              type: string
              description: >
                Use 'derived_from' for the PROV run,
                'related' for SOSA observation
            type: { type: string }
            title: { type: string }
      assets:
        type: object
        description: Named output files
        additionalProperties:
          type: object
          required: [href, type]
          properties:
            href:  { type: string }
            type:  { type: string }
            title: { type: string }
            roles:
              type: array
              items:
                type: string
                enum: [data, overview, thumbnail, metadata]