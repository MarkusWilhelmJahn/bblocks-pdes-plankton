$schema: https://json-schema.org/draft/2020-12/schema
title: PlanktonInitialObservation
description: >
  A SOSA ObservationCollection providing the initial state of a water body
  or mesocosm. Per the SSN/SOSA PROV alignment (W3C SSN 2017, §6.5):
    - sosa:ObservationCollection is a container of sosa:Observation instances
    - each sosa:Observation ⊑ prov:Activity
    - each sosa:Sensor ⊑ prov:Agent  → sosa:madeBySensor ⊑ prov:wasAssociatedWith
    - each sosa:Result ⊑ prov:Entity → sosa:hasResult    ⊑ prov:wasGeneratedBy
    - sosa:FeatureOfInterest ⊑ prov:Entity
  resultTime of the collection becomes t=0 of the simulation run.
type: object
required: [type, featureOfInterest, phenomenonTime, madeBySensor, hasMember]
properties:

  type:
    const: ObservationCollection

  featureOfInterest:
    type: object
    description: >
      The sampled water body or mesocosm (sosa:FeatureOfInterest ⊑ prov:Entity).
      Represented as a GeoJSON Feature.
    required: [type, geometry]
    properties:
      type:     { const: Feature }
      geometry: { type: object, description: "GeoJSON geometry of the sampling location" }
      properties:
        type: object
        properties:
          name:            { type: string }
          depth_m:         { type: number, minimum: 0 }
          water_body_type: { type: string, description: "e.g. lake, mesocosm, coastal_shelf" }

  phenomenonTime:
    type: string
    description: >
      ISO 8601 time interval of the sampling campaign (e.g. '2022-06-28/2022-07-01').
      The sosa:phenomenonTime is the time the observed property values apply to the
      featureOfInterest — not necessarily when the observation was recorded.

  madeBySensor:
    type: string
    description: >
      URI or name of the sensor / observer.
      sosa:madeBySensor ⊑ prov:wasAssociatedWith.
      The sensor is a sosa:Sensor ⊑ prov:Agent.

  hasMember:
    type: array
    description: >
      The individual sosa:Observation instances that form this collection.
      Each member is itself a prov:Activity that generates one sosa:Result
      (prov:Entity) for one sosa:ObservableProperty of the featureOfInterest.
      Per the spec each Observation must have exactly one observedProperty
      and at least one hasResult.
    minItems: 1
    items:
      type: object
      required: [observedProperty, hasResult, resultTime]
      properties:

        observedProperty:
          type: string
          description: >
            URI of the sosa:ObservableProperty being measured.
            Use one of:
              https://mwj.example.org/plankton/obs/phytoplanktonDensity
              https://mwj.example.org/plankton/obs/zooplanktonDensity
              https://mwj.example.org/plankton/obs/nutrientLevel
              https://mwj.example.org/plankton/obs/fishPredationPressure

        hasResult:
          type: object
          description: >
            The sosa:Result of this individual Observation (prov:Entity
            wasGeneratedBy this Observation prov:Activity).
          required: [value, unit]
          properties:
            value:
              type: number
              description: "Numeric measurement value"
            unit:
              type: string
              description: >
                Unit of measure. Expected values:
                  'mg.dw/l'     for X1, X2
                  'relative'    for N
                  'mg.dw/d/l'   for F

        resultTime:
          type: string
          format: date-time
          description: >
            ISO 8601 timestamp when this individual observation was completed
            (sosa:resultTime). The resultTime of the first member becomes t=0
            of the linked SimulationRun.

        usedProcedure:
          type: string
          description: >
            URI of the sosa:Procedure (measurement protocol) used for this
            individual observation. sosa:usedProcedure ⊑ prov:used.
            Optional; omit if using a generic field sampling protocol.

  perturbation:
    type: object
    description: >
      Optional spatial perturbation applied to the homogeneous initial condition
      to seed pattern formation in the PDE simulation.
    properties:
      amplitude:
        type: number
        description: "Perturbation amplitude (fraction of steady-state value)"
      type:
        type: string
        enum: [random, symmetric, asymmetric, none]
